<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost & Found Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🎒 Campus Lost & Found Portal</h1>
        <p>Helping students recover lost belongings</p>
    </header>

    <section class="stats">
        <div class="card">
            <h2>Lost Items</h2>
            <p>0</p>
        </div>

        <div class="card">
            <h2>Found Items</h2>
            <p>0</p>
        </div>
    </section>

    <section class="buttons">

        <button>Report Lost Item</button>

        <button>Report Found Item</button>

    </section>
    <section class="form-section">

    <h2>Report Lost Item</h2>

    <form id="lostForm">

        <input type="text" placeholder="Item Name">

        <input type="text" placeholder="Location Lost">

        <input type="date">

        <input type="text" placeholder="Contact Number">

        <textarea placeholder="Description"></textarea>

        <button type="submit">Submit Report</button>

    </form>

</section>
<section class="reports">

    <h2>Lost Item Reports</h2>

    <div id="lostItemsContainer"></div>

</section>
<script src="script.js"></script>

</body>

</html>
