<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost & Found Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🎒 Campus Lost & Found Portal</h1>
        <p>Helping students recover lost belongings</p>
    </header>

    <section class="stats">
        <div class="card">
            <h2>Lost Items</h2>
            <p>0</p>
        </div>

        <div class="card">
            <h2>Found Items</h2>
            <p>0</p>
        </div>
    </section>

    <section class="buttons">

        <button>Report Lost Item</button>

        <button>Report Found Item</button>

    </section>

</body>

</html>
